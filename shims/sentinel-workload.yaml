---
# A minimal GPU-holding workload used as the "baseline" in runbook demos.
# Requests 1 GPU, holds it via a long sleep. Gets evicted during fault drain.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvsx-sentinel-workload
  namespace: default
  labels:
    app: nvsx-sentinel-workload
    nvsx.io/purpose: "demo-baseline"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nvsx-sentinel-workload
  template:
    metadata:
      labels:
        app: nvsx-sentinel-workload
    spec:
      tolerations:
        # Tolerate the nvidia GPU taint if present
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: sentinel
          image: nvcr.io/nvidia/cuda:12.2.0-base-ubuntu22.04
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "sentinel workload online: $(hostname)"
              echo "GPU reservation: 1"
              while true; do
                date -u +"%Y-%m-%dT%H:%M:%SZ  holding GPU on $(hostname)"
                sleep 15
              done
          resources:
            limits:
              nvidia.com/gpu: 1
