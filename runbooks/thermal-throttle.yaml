apiVersion: nvsx/v1
kind: Runbook
metadata:
  name: thermal-throttle
  nickname: sleepy-panda
  title: "Thermal throttling detection"
  summary: "GpuThermalWatch flips → PreferNoSchedule taint → drain at end of shift."
  tags: [infra, thermal, stub]
  estimatedDuration: 60s

# Stub runbook: demonstrates the gentle-response pattern for thermal events.
# Add your own hook scripts + any extra watch clauses specific to your cluster.

prerequisites:
  - name: nvsentinel-control-plane
    check: "kubectl get pods -n nvsentinel -l app.kubernetes.io/name=fault-quarantine -o jsonpath='{.items[*].status.phase}'"
    expect: "Running"

stages:
  - id: preflight
    title: "Pre-flight"
    timeout: 15s

  - id: detect
    title: "GpuThermalWatch flips"
    watch:
      - kind: node-condition
        type: GpuThermalWatch
        status: "True"
    timeout: 60s

  - id: quarantine
    title: "PreferNoSchedule taint applied"
    watch:
      - kind: taint
        key: "nvidia.com/gpu-error"
    timeout: 60s

  - id: recover
    title: "Cool-off + uncordon"
    watch:
      - kind: node-condition
        type: GpuThermalWatch
        status: "False"
    timeout: 600s
    dwell: 4s

  - id: postmortem
    title: "Collect artifacts"
    timeout: 60s

narration:
  preflight:   "Pre-flight thermal runbook."
  detect:      "NVSentinel: GpuThermalWatch=True in {{elapsed}}."
  quarantine:  "Taint applied — existing work finishes, no new pods land."
  recover:     "Cooled off; node back in schedulable pool."
  postmortem:  "Thermal timeline captured."
