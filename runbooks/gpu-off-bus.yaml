apiVersion: nvsx/v1
kind: Runbook
metadata:
  name: gpu-off-bus
  nickname: rogue-moose
  title: "GPU fell off bus → self-heal"
  summary: "XID 79 → NVSentinel quarantine → RebootNode CRD → node recovered. No human in the loop."
  tags: [infra, nvsentinel, xid, remediation]
  estimatedDuration: 90s

# This runbook observes NVSentinel's response to an XID 79 fault ("GPU has
# fallen off the bus") and fires operator hooks at each stage. It is
# triggered either manually (`nvsx run gpu-off-bus`) or by the webhook
# daemon (`nvsx serve`) when the matching NVSentinel event is emitted.

prerequisites:
  - name: nvsentinel-control-plane
    check: "kubectl get pods -n nvsentinel -l app.kubernetes.io/name=fault-quarantine -o jsonpath='{.items[*].status.phase}'"
    expect: "Running"
  - name: gpu-health-monitor
    check: "kubectl get daemonset -n nvsentinel gpu-health-monitor -o jsonpath='{.status.numberReady}'"
    expect: ">=1"
  - name: mongodb
    check: "kubectl get pod -n nvsentinel -l app.kubernetes.io/name=mongodb -o jsonpath='{.items[0].status.phase}'"
    expect: "Running"

stages:
  - id: preflight
    title: "Pre-flight checks"
    hook: hooks/gpu-off-bus/preflight.sh
    timeout: 20s

  - id: detect
    title: "NVSentinel detects fault"
    watch:
      - kind: node-condition
        type: GpuPcieWatch
        status: "True"
    timeout: 60s

  - id: quarantine
    title: "Fault-quarantine cordons node"
    watch:
      - kind: node
        field: spec.unschedulable
        expect: "true"
      - kind: taint
        key: "nvidia.com/gpu-error"
    timeout: 60s

  - id: drain
    title: "Node-drainer evicts workloads"
    watch:
      - kind: pod-event
        reason: "Evicted"
    timeout: 120s

  - id: remediate
    title: "RebootNode CRD created"
    watch:
      - kind: crd
        group: janitor.dgxc.nvidia.com
        resource: rebootnodes
    hook: hooks/gpu-off-bus/on-remediate.sh
    timeout: 60s
    dwell: 5s

  - id: recover
    title: "Node rejoins, workloads reschedule"
    watch:
      - kind: node-condition
        type: GpuPcieWatch
        status: "False"
      - kind: node
        field: spec.unschedulable
        expect: "false"
    hook: hooks/gpu-off-bus/on-recover.sh
    timeout: 600s
    dwell: 6s

  - id: postmortem
    title: "Collect artifacts"
    action:
      script: scripts/collect-metrics.sh
      args: ["./nvsx-artifacts"]
    timeout: 120s

narration:
  preflight:   "Checking NVSentinel control-plane + GPU health monitor + MongoDB..."
  detect:      "NVSentinel sees it. GpuPcieWatch flipped in {{elapsed}}."
  quarantine:  "Fault-quarantine cordoned the node and applied the gpu-error taint."
  drain:       "Node-drainer evicted workloads from the cordoned node."
  remediate:   "Fault-remediation created a RebootNode CRD. Janitor takes it from here."
  recover:     "Condition cleared. Node back online. Workloads rescheduling."
  postmortem:  "Wrote {{artifactCount}} artifact files to {{artifactDir}}."
